# updated3
name: Branch 2 — test (Image-First, ECR)

on:
  push:
    branches:
      - test

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build application artifact
        run: |
          mkdir -p artifact_out
          pip install -r requirements.txt --quiet
          python manage.py collectstatic --noinput || true
          tar -czf artifact_out/app-${{ github.sha }}.tar.gz \
            --exclude='.git' \
            --exclude='artifacts' \
            .
          echo "Artifact built: app-${{ github.sha }}.tar.gz"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image from artifact
        run: |
          docker build \
            -t 913524900585.dkr.ecr.eu-central-1.amazonaws.com/book_shop:${{ github.sha }} \
            -t 913524900585.dkr.ecr.eu-central-1.amazonaws.com/book_shop:test-latest \
            .

      - name: Push image to ECR
        run: |
          docker push 913524900585.dkr.ecr.eu-central-1.amazonaws.com/book_shop:${{ github.sha }}
          docker push 913524900585.dkr.ecr.eu-central-1.amazonaws.com/book_shop:test-latest
          echo "IMAGE_URI=913524900585.dkr.ecr.eu-central-1.amazonaws.com/book_shop:${{ github.sha }}" >> $GITHUB_ENV
          
   - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: IMAGE_URI
          script: |
            set -e
            aws ecr get-login-password --region eu-central-1 | \
              docker login --username AWS --password-stdin \
              913524900585.dkr.ecr.eu-central-1.amazonaws.com
            
            docker pull $IMAGE_URI
            
            mkdir -p ~/book_shop_test
            cd ~/book_shop_test
            
           
            cp ~/book_shop_docker-main/book_shop_docker-main-main/docker-compose.yml .
            cp ~/book_shop_docker-main/book_shop_docker-main-main/.env .
            
            docker compose -p test down || true
            
            sed -i '/backend:/,/networks:/ s|build:.*|image: '"$IMAGE_URI"'|' docker-compose.yml
            
            docker compose -p test up -d
