name: Dev Pipeline

on:
  push:
    branches:
      - dev

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Artifact
        run: |
          mkdir -p book_shop_docker-main-main/artifacts
          tar --exclude='./artifacts' --exclude='./.git' --exclude='./.github' \
            -czvf book_shop_docker-main-main/artifacts/app-${{ github.sha }}.tar.gz \
            -C book_shop_docker-main-main .

      - name: Commit Artifact to Repository
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: add build artifact app-${{ github.sha }}.tar.gz"
          branch: dev
          file_pattern: 'book_shop_docker-main-main/artifacts/*.tar.gz'

      - name: Build Docker image from artifact
        run: |
          docker build \
            --build-arg ARTIFACT_NAME=app-${{ github.sha }}.tar.gz \
            -t book_shop:${{ github.sha }} \
            -t book_shop:dev-latest \
            -f book_shop_docker-main-main/Dockerfile \
            book_shop_docker-main-main

      - name: Save Docker image as tar
        run: docker save book_shop:${{ github.sha }} | gzip > /tmp/book_shop_dev.tar.gz

      - name: Copy image to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: /tmp/book_shop_dev.tar.gz
          target: /tmp/

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker load < /tmp/book_shop_dev.tar.gz
            cd /home/${{ secrets.EC2_USER }}/book_shop_docker-main/book_shop_docker-main-main
            git fetch origin dev
            git reset --hard origin/dev
            sed -i "s|image: .*book_shop.*|image: book_shop:${{ github.sha }}|g" docker-compose.yml
            docker compose -p dev -f docker-compose.yml down || true
            docker compose -p dev -f docker-compose.yml up -d
