name: Prod Deployment

on:
  push:
    branches:
      - prod

jobs:
  deploy-prod:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            export IMAGE_VERSION=${{ vars.IMAGE_VERSION }}
            export FULL_IMAGE_URI="913524900585.dkr.ecr.eu-central-1.amazonaws.com/book_shop:$IMAGE_VERSION"

            aws ecr get-login-password --region eu-central-1 | \
              docker login --username AWS --password-stdin \
              913524900585.dkr.ecr.eu-central-1.amazonaws.com

            mkdir -p ~/book_shop_prod
            cd ~/book_shop_prod
            
            cp ~/book_shop_docker-main/book_shop_docker-main-main/docker-compose.yml .
            cp ~/book_shop_docker-main/book_shop_docker-main-main/.env .

            sed -i '/backend:/,/networks:/ s|build:.*|image: '"$FULL_IMAGE_URI"'|' docker-compose.yml
            sed -i '/backend:/,/networks:/ s|image: .*|image: '"$FULL_IMAGE_URI"'|' docker-compose.yml

            docker compose -p prod pull
            docker compose -p prod down || true
            docker compose -p prod up -d
